<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FigureSkateAI — Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body, #root { height: 100%; }
body { font-family: 'Space Grotesk', 'Noto Sans JP', sans-serif; -webkit-font-smoothing: antialiased; background: oklch(0.97 0.008 220); }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: oklch(0.78 0.006 240); border-radius: 3px; }

:root {
  --bg:     oklch(0.97 0.008 220);
  --bg2:    oklch(0.93 0.008 220);
  --bg3:    oklch(0.89 0.008 220);
  --accent: oklch(0.48 0.16 200);
  --violet: oklch(0.50 0.16 270);
  --text:   oklch(0.12 0.020 240);
  --muted:  oklch(0.45 0.010 240);
  --border: oklch(0.82 0.006 240);
}

/* モバイルでサイドバーを隠す */
@media (max-width: 640px) {
  .sidebar { display: none !important; }
  .topbar-logo { display: flex !important; }
  .msg-max { padding: 0 14px !important; }
  .input-wrap { padding: 10px 14px 16px !important; }
  .input-hint { display: none !important; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const FREE_LIMIT = 20;
const MSG_KEY    = 'fsai_messages_v2';
const COUNT_KEY  = 'fsai_free_count';
const HIST_KEY   = 'fsai_history';

const API_URL = 'https://f-igure-skate-a-ichat.vercel.app/api/chat';

const SUGGESTIONS = [
  '四回転サルコウって何？',
  '坂本花織選手ってどんな人？',
  'GOEの仕組みを教えて',
  'ループとフリップの違いは？',
  'ネイサン・チェンの代表的な演技は？',
  'PCSって何を評価するの？',
];

/* ── Markdown簡易レンダラー ── */
function renderMD(text) {
  return text.split('\n').map((line, i) => {
    if (!line.trim()) return <br key={i} />;
    const parts = line.split(/(\*\*[^*]+\*\*)/g).map((p, j) =>
      p.startsWith('**') && p.endsWith('**')
        ? <strong key={j} style={{ color: 'var(--accent)', fontWeight: 700 }}>{p.slice(2, -2)}</strong>
        : p
    );
    if (line.startsWith('- ') || line.startsWith('・')) {
      return (
        <div key={i} style={{ display: 'flex', gap: 8, marginBottom: 3, paddingLeft: 4 }}>
          <span style={{ color: 'var(--accent)', flexShrink: 0 }}>·</span>
          <span>{parts}</span>
        </div>
      );
    }
    return <p key={i} style={{ marginBottom: 3, lineHeight: 1.78 }}>{parts}</p>;
  });
}

/* ── タイピングアニメーション ── */
function TypingDots() {
  return (
    <div style={{ display: 'flex', gap: 5, padding: '4px 0', alignItems: 'center' }}>
      {[0, 1, 2].map(i => (
        <div key={i} style={{ width: 7, height: 7, borderRadius: '50%', background: 'var(--accent)', animation: `bounce 1.2s ${i * 0.2}s ease-in-out infinite` }} />
      ))}
      <style>{`@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}`}</style>
    </div>
  );
}

/* ── ペイウォールモーダル ── */
function PaywallModal({ onClose }) {
  return (
    <div style={{ position: 'fixed', inset: 0, background: '#00000055', display: 'flex', alignItems: 'flex-end', justifyContent: 'center', zIndex: 200, backdropFilter: 'blur(10px)' }}
      onClick={onClose}>
      {/* スマホ: 下から出るシート / PC: 中央モーダル */}
      <div onClick={e => e.stopPropagation()} style={{
        background: 'white',
        borderRadius: '20px 20px 0 0',
        padding: '32px 24px 40px',
        width: '100%',
        maxWidth: 480,
        textAlign: 'center',
        boxShadow: '0 -8px 40px oklch(0.45 0.01 240 / 0.12)',
      }}>
        {/* ドラッグハンドル */}
        <div style={{ width: 36, height: 4, borderRadius: 2, background: 'var(--border)', margin: '0 auto 24px' }} />
        <div style={{ width: 52, height: 52, borderRadius: '50%', margin: '0 auto 16px', background: 'linear-gradient(135deg, var(--accent), var(--violet))', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22 }}>⛸</div>
        <h2 style={{ color: 'var(--text)', fontSize: 19, fontWeight: 700, marginBottom: 8, letterSpacing: '-0.02em' }}>無料トライアル終了</h2>
        <p style={{ color: 'var(--muted)', fontSize: 14, lineHeight: 1.75, marginBottom: 24, fontFamily: "'Noto Sans JP',sans-serif" }}>
          無料質問をご利用いただきました。<br />月額500円〜でARIAと無制限に会話できます。
        </p>
        <a href="Pricing.html" style={{ display: 'block', background: 'var(--accent)', color: 'white', padding: '15px 0', borderRadius: 12, fontWeight: 700, fontSize: 16, textDecoration: 'none', marginBottom: 10, fontFamily: "'Noto Sans JP',sans-serif" }}>
          料金プランを見る →
        </a>
        <button onClick={onClose} style={{ background: 'transparent', border: '1px solid var(--border)', color: 'var(--muted)', padding: '13px 0', borderRadius: 12, fontSize: 14, cursor: 'pointer', width: '100%', fontFamily: "'Noto Sans JP',sans-serif" }}>
          あとで
        </button>
      </div>
    </div>
  );
}

/* ── モバイル用ドロワー ── */
function Drawer({ open, onClose, onSuggest }) {
  if (!open) return null;
  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 150 }} onClick={onClose}>
      <div style={{ position: 'absolute', inset: 0, background: '#00000044' }} />
      <div onClick={e => e.stopPropagation()} style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: 280, background: 'white', borderRight: '1px solid var(--border)', display: 'flex', flexDirection: 'column', boxShadow: '4px 0 24px oklch(0.45 0.01 240 / 0.12)' }}>
        <div style={{ padding: '20px 18px 14px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: 'var(--text)' }}>
            Figure<span style={{ color: 'var(--accent)' }}>Skate</span>AI
          </div>
          <button onClick={onClose} style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: 'var(--muted)', fontSize: 20, lineHeight: 1 }}>×</button>
        </div>
        <div style={{ padding: '12px 10px', flex: 1, overflowY: 'auto' }}>
          <div style={{ fontSize: 11, color: 'var(--muted)', letterSpacing: '0.06em', marginBottom: 8, fontWeight: 600, paddingLeft: 8 }}>よく聞かれる質問</div>
          {SUGGESTIONS.map((s, i) => (
            <button key={i} onClick={() => { onSuggest(s); onClose(); }}
              style={{ display: 'block', width: '100%', textAlign: 'left', background: 'transparent', border: 'none', cursor: 'pointer', padding: '10px 10px', borderRadius: 7, marginBottom: 2, color: 'var(--muted)', fontSize: 14, fontFamily: "'Noto Sans JP',sans-serif" }}>
              {s}
            </button>
          ))}
        </div>
        <div style={{ padding: '14px', borderTop: '1px solid var(--border)' }}>
          <a href="Pricing.html" style={{ display: 'block', background: 'var(--accent)', color: 'white', padding: '12px 0', borderRadius: 8, textAlign: 'center', fontWeight: 700, fontSize: 14, textDecoration: 'none', fontFamily: "'Noto Sans JP',sans-serif" }}>
            プレミアムにアップグレード
          </a>
        </div>
      </div>
    </div>
  );
}

/* ── メインアプリ ── */
function App() {
  const initMsgs = () => {
    try { const s = localStorage.getItem(MSG_KEY); if (s) return JSON.parse(s); } catch (e) {}
    return [{ id: 0, role: 'ai', text: 'こんにちは！フィギュアスケートのことなら何でも聞いてください⛸\n\nジャンプの技術、選手のこと、採点ルールまで競技者視点でお答えします。今日はどんなことが気になりますか？' }];
  };
  const initCount = () => { try { return parseInt(localStorage.getItem(COUNT_KEY) || '0'); } catch (e) { return 0; } };
  const initHist  = () => { try { const s = localStorage.getItem(HIST_KEY); return s ? JSON.parse(s) : []; } catch (e) { return []; } };

  const [messages,    setMessages]    = useState(initMsgs);
  const [chatHistory, setChatHistory] = useState(initHist);
  const [input,       setInput]       = useState('');
  const [typing,      setTyping]      = useState(false);
  const [freeCount,   setFreeCount]   = useState(initCount);
  const [showPaywall, setShowPaywall] = useState(false);
  const [error,       setError]       = useState('');
  const [drawerOpen,  setDrawerOpen]  = useState(false);

  const bottomRef = useRef(null);
  const inputRef  = useRef(null);

  useEffect(() => { try { localStorage.setItem(MSG_KEY,   JSON.stringify(messages));    } catch (e) {} }, [messages]);
  useEffect(() => { try { localStorage.setItem(COUNT_KEY, String(freeCount));           } catch (e) {} }, [freeCount]);
  useEffect(() => { try { localStorage.setItem(HIST_KEY,  JSON.stringify(chatHistory)); } catch (e) {} }, [chatHistory]);
  const scrollAreaRef = useRef(null);
  useEffect(() => {
    if (scrollAreaRef.current) {
      scrollAreaRef.current.scrollTo({ top: scrollAreaRef.current.scrollHeight, behavior: 'smooth' });
    }
  }, [messages, typing]);

  const send = async (text) => {
    const q = (text || input).trim();
    if (!q || typing) return;
    if (freeCount >= FREE_LIMIT) { setShowPaywall(true); return; }

    const newCount = freeCount + 1;
    setFreeCount(newCount);
    setInput('');
    setError('');
    setMessages(prev => [...prev, { id: Date.now(), role: 'user', text: q }]);
    setTyping(true);

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: q, history: chatHistory })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'APIエラー');
      setTyping(false);
      setMessages(prev => [...prev, { id: Date.now() + 1, role: 'ai', text: data.text }]);
      setChatHistory(data.history);
      if (newCount >= FREE_LIMIT) setTimeout(() => setShowPaywall(true), 1400);
    } catch (err) {
      setTyping(false);
      setError('通信エラーが発生しました。もう一度お試しください。');
      setFreeCount(prev => prev - 1);
    }
  };

  const remaining = FREE_LIMIT - freeCount;
  const isPremium = freeCount >= FREE_LIMIT;

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden', background: 'var(--bg)' }}>

      {/* ── PCサイドバー（641px以上で表示） ── */}
      <div className="sidebar" style={{ width: 252, background: 'white', borderRight: '1px solid var(--border)', display: 'flex', flexDirection: 'column', flexShrink: 0 }}>
        <div style={{ padding: '20px 18px 14px', borderBottom: '1px solid var(--border)' }}>
          <a href="Landing Page.html" style={{ textDecoration: 'none' }}>
            <div style={{ fontSize: 15, fontWeight: 700, color: 'var(--text)', marginBottom: 2 }}>
              Figure<span style={{ color: 'var(--accent)' }}>Skate</span>AI
            </div>
          </a>
          <div style={{ fontSize: 11, color: 'var(--muted)' }}>AIコーチ ARIA</div>
        </div>
        <div style={{ padding: '12px 10px 8px', flex: 1 }}>
          <div style={{ fontSize: 11, color: 'var(--muted)', letterSpacing: '0.06em', marginBottom: 8, fontWeight: 600, paddingLeft: 8 }}>よく聞かれる質問</div>
          {SUGGESTIONS.map((s, i) => (
            <button key={i} onClick={() => { setInput(s); inputRef.current?.focus(); }}
              style={{ display: 'block', width: '100%', textAlign: 'left', background: 'transparent', border: 'none', cursor: 'pointer', padding: '8px 10px', borderRadius: 7, marginBottom: 2, color: 'var(--muted)', fontSize: 13, fontFamily: "'Noto Sans JP',sans-serif", transition: 'all 0.15s' }}
              onMouseEnter={e => { e.currentTarget.style.background = 'oklch(0.48 0.16 200 / 0.10)'; e.currentTarget.style.color = 'var(--text)'; }}
              onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'var(--muted)'; }}>
              {s}
            </button>
          ))}
        </div>
        <div style={{ padding: '14px', borderTop: '1px solid var(--border)' }}>
          <a href="Pricing.html" style={{ display: 'block', background: 'var(--accent)', color: 'white', padding: '11px 0', borderRadius: 8, textAlign: 'center', fontWeight: 700, fontSize: 13, textDecoration: 'none', fontFamily: "'Noto Sans JP',sans-serif" }}>
            プレミアムにアップグレード
          </a>
        </div>
      </div>

      {/* ── メインエリア ── */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', minWidth: 0 }}>

        {/* 開発者リセットバー */}
        <div style={{ background: 'oklch(0.96 0.03 90)', borderBottom: '1px solid oklch(0.88 0.05 90)', padding: '5px 16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
          <span style={{ fontSize: 11, color: 'oklch(0.45 0.08 90)', fontFamily: "'Noto Sans JP',sans-serif" }}>🛠 開発者モード</span>
          <button onClick={() => { localStorage.removeItem(COUNT_KEY); localStorage.removeItem(MSG_KEY); localStorage.removeItem(HIST_KEY); location.reload(); }}
            style={{ fontSize: 11, color: 'oklch(0.45 0.08 90)', background: 'transparent', border: '1px solid oklch(0.78 0.06 90)', borderRadius: 5, padding: '2px 10px', cursor: 'pointer', fontFamily: "'Noto Sans JP',sans-serif" }}>
            リセット
          </button>
        </div>

        {/* トップバー */}
        <div style={{ padding: '12px 16px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', background: 'white', flexShrink: 0, gap: 10 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, minWidth: 0 }}>
            {/* モバイル用ハンバーガーボタン */}
            <button onClick={() => setDrawerOpen(true)}
              style={{ display: 'none', background: 'transparent', border: 'none', cursor: 'pointer', padding: 4, color: 'var(--muted)', flexShrink: 0 }}
              className="hamburger-btn"
              id="hamburger">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div style={{ width: 34, height: 34, borderRadius: '50%', background: 'linear-gradient(135deg, var(--accent), var(--violet))', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700, color: 'white', flexShrink: 0 }}>AR</div>
            <div style={{ minWidth: 0 }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--text)', whiteSpace: 'nowrap' }}>ARIA</div>
              <div style={{ fontSize: 11, color: 'var(--accent)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>元フィギュアスケート選手 / AIコーチ</div>
            </div>
          </div>

          {!isPremium ? (
            <div style={{ background: 'oklch(0.48 0.16 200 / 0.10)', border: '1px solid oklch(0.48 0.16 200 / 0.28)', borderRadius: 100, padding: '4px 12px', display: 'flex', alignItems: 'center', gap: 7, flexShrink: 0 }}>
              <div style={{ display: 'flex', gap: 3 }}>
                {[0, 1, 2].map(i => <div key={i} style={{ width: 7, height: 7, borderRadius: '50%', background: i < Math.min(remaining, 3) ? 'var(--accent)' : 'var(--border)' }} />)}
              </div>
              <span style={{ fontSize: 12, color: 'var(--accent)', fontFamily: "'Noto Sans JP',sans-serif", whiteSpace: 'nowrap' }}>残り{remaining}回</span>
            </div>
          ) : (
            <a href="Pricing.html" style={{ background: 'var(--accent)', color: 'white', padding: '7px 14px', borderRadius: 8, fontSize: 13, fontWeight: 700, textDecoration: 'none', fontFamily: "'Noto Sans JP',sans-serif", flexShrink: 0 }}>
              アップグレード
            </a>
          )}
        </div>

        {/* メッセージ一覧 */}
        <div ref={scrollAreaRef} style={{ flex: 1, overflowY: 'auto', padding: '20px 0' }}>
          <div className="msg-max" style={{ maxWidth: 720, margin: '0 auto', padding: '0 20px' }}>
            {messages.map(m => (
              <div key={m.id} style={{ display: 'flex', flexDirection: m.role === 'user' ? 'row-reverse' : 'row', gap: 10, marginBottom: 18, alignItems: 'flex-start' }}>
                {m.role === 'ai' && (
                  <div style={{ width: 30, height: 30, borderRadius: '50%', flexShrink: 0, background: 'linear-gradient(135deg, var(--accent), var(--violet))', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 9, fontWeight: 700, color: 'white', marginTop: 4 }}>AR</div>
                )}
                <div style={{
                  maxWidth: '82%',
                  background: m.role === 'user' ? 'var(--accent)' : 'white',
                  border: m.role === 'user' ? 'none' : '1px solid var(--border)',
                  borderRadius: m.role === 'user' ? '16px 16px 4px 16px' : '4px 16px 16px 16px',
                  padding: '11px 15px',
                  fontSize: 14,
                  fontFamily: "'Noto Sans JP',sans-serif",
                  color: m.role === 'user' ? 'white' : 'var(--text)',
                  lineHeight: 1.7,
                  boxShadow: m.role === 'ai' ? '0 1px 4px oklch(0.45 0.01 240 / 0.06)' : 'none',
                  wordBreak: 'break-word',
                }}>
                  {m.role === 'ai' ? renderMD(m.text) : m.text}
                </div>
              </div>
            ))}

            {typing && (
              <div style={{ display: 'flex', gap: 10, marginBottom: 18, alignItems: 'flex-start' }}>
                <div style={{ width: 30, height: 30, borderRadius: '50%', flexShrink: 0, background: 'linear-gradient(135deg, var(--accent), var(--violet))', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 9, fontWeight: 700, color: 'white', marginTop: 4 }}>AR</div>
                <div style={{ background: 'white', border: '1px solid var(--border)', borderRadius: '4px 16px 16px 16px', padding: '12px 16px', boxShadow: '0 1px 4px oklch(0.45 0.01 240 / 0.06)' }}>
                  <TypingDots />
                </div>
              </div>
            )}

            {error && (
              <div style={{ textAlign: 'center', padding: '8px 14px', color: 'oklch(0.45 0.15 25)', fontSize: 13, fontFamily: "'Noto Sans JP',sans-serif", background: 'oklch(0.97 0.03 25)', border: '1px solid oklch(0.88 0.05 25)', borderRadius: 8, marginBottom: 14 }}>
                {error}
              </div>
            )}
            <div ref={bottomRef} />
          </div>
        </div>

        {/* 入力エリア */}
        <div className="input-wrap" style={{ padding: '10px 16px 18px', background: 'white', borderTop: '1px solid var(--border)', flexShrink: 0 }}>
          <div style={{ maxWidth: 720, margin: '0 auto' }}>
            <div style={{ display: 'flex', gap: 10, alignItems: 'flex-end', background: 'var(--bg)', border: '1px solid var(--border)', borderRadius: 12, padding: '10px 12px' }}>
              <textarea
                ref={inputRef}
                value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
                placeholder="ARIAに質問する…"
                disabled={isPremium || typing}
                style={{ flex: 1, background: 'transparent', border: 'none', outline: 'none', color: 'var(--text)', fontSize: 15, resize: 'none', maxHeight: 100, fontFamily: "'Noto Sans JP',sans-serif", lineHeight: 1.6, minHeight: 24 }}
                rows={1}
              />
              <button onClick={() => send()} disabled={!input.trim() || isPremium || typing}
                style={{ width: 38, height: 38, borderRadius: 9, border: 'none', cursor: input.trim() && !isPremium && !typing ? 'pointer' : 'default', background: input.trim() && !isPremium && !typing ? 'var(--accent)' : 'var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'background 0.2s', flexShrink: 0 }}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </div>
            <p className="input-hint" style={{ fontSize: 11, color: 'var(--muted)', marginTop: 6, textAlign: 'center', fontFamily: "'Noto Sans JP',sans-serif" }}>
              Enter で送信 · Shift+Enter で改行
            </p>
          </div>
        </div>
      </div>

      {/* モバイルドロワー */}
      <Drawer open={drawerOpen} onClose={() => setDrawerOpen(false)} onSuggest={s => { setInput(s); inputRef.current?.focus(); }} />

      {showPaywall && <PaywallModal onClose={() => setShowPaywall(false)} />}

      {/* モバイルでハンバーガーボタンを表示 */}
      <style>{`
        @media (max-width: 640px) {
          #hamburger { display: flex !important; }
        }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
