              <div style={{fontSize:11,color:t.muted,fontFamily:"'Noto Sans JP',sans-serif"}}>{f.desc}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const t = THEMES[tweaks.theme] || THEMES.ice;

  const VARIANTS = { A: VariantA, B: VariantB, C: VariantC };
  const ActiveVariant = VARIANTS[tweaks.variant] || VariantA;

  return (
    <div style={{width:'100vw',minHeight:'100vh',display:'flex',alignItems:'flex-start',justifyContent:'center',padding:32,background:'#080c10'}}>
      <div style={{transform:'scale(0.72)',transformOrigin:'top center',marginBottom:-900*0.28}}>
        <ActiveVariant t={t}/>
      </div>

      <TweaksPanel>
        <TweakSection label="バリエーション">
          <TweakRadio
            id="variant"
            value={tweaks.variant}
            options={[
              {value:'A', label:'A: ドラマ'},
              {value:'B', label:'B: スプリット'},
              {value:'C', label:'C: ミニマル'},
            ]}
            onChange={v => setTweak('variant', v)}
          />
        </TweakSection>

        <TweakSection label="カラーテーマ">
          <TweakRadio
            id="theme"
            value={tweaks.theme}
            options={[
              {value:'ice',      label:'❄️ アイスブルー'},
              {value:'midnight', label:'🌙 ミッドナイト紫'},
              {value:'arctic',   label:'☁️ アークティック白'},
            ]}
            onChange={v => setTweak('theme', v)}
          />
        </TweakSection>

        <TweakSection label="ページ移動">
          <TweakButton label="💬 チャットページ" onClick={() => location.href='Chat.html'}/>
          <TweakButton label="💳 料金ページ" onClick={() => location.href='Pricing.html'}/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
